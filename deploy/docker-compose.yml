services:
  docker:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - workspace:/workspace
      - docker-graph:/var/lib/docker
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 12

  webui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      docker:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DOCKER_HOST: tcp://docker:2375
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://localhost:11434/v1}
    volumes:
      - data:/data
      - workspace:/workspace
    command:
      - bash
      - -lc
      - |
        rm -rf /workspace/lm-eval
        mkdir -p /workspace/lm-eval
        cp -a /app/. /workspace/lm-eval/
        cd /workspace/lm-eval
        python -m lm_eval_webui \
          --host 0.0.0.0 \
          --port 8080 \
          --data-dir /data \
          --static-dir static \
          --openai-base-url "$${OPENAI_BASE_URL}" \
          --max-request-workers 16 \
          --pi-bench-dir /workspace/lm-eval/third_party/pi-bench

volumes:
  data:
  workspace:
  docker-graph:
