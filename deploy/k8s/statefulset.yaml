apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lm-eval-webui
  namespace: lm-eval-webui
spec:
  serviceName: lm-eval-webui
  replicas: 1
  selector:
    matchLabels:
      app: lm-eval-webui
  template:
    metadata:
      labels:
        app: lm-eval-webui
    spec:
      containers:
        - name: webui
          image: savagemindz/lm-eval-webui:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
            - name: OPENAI_BASE_URL
              value: http://localhost:11434/v1
            - name: HF_HOME
              value: /data/huggingface
            - name: HF_DATASETS_CACHE
              value: /data/huggingface/datasets
            - name: LMEVAL_WEBUI_HF_RETRIES
              value: "5"
            - name: LMEVAL_WEBUI_HF_RETRY_DELAY
              value: "10"
            - name: LMEVAL_WEBUI_HF_RETRY_MAX_DELAY
              value: "120"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
            - name: PI_BENCH_AUTH_SOURCE
              value: /secrets/pi-auth/auth.json
            - name: PI_BENCH_REQUIRE_PI_AUTH
              value: "0"
          command:
            - bash
            - -lc
            - |
              rm -rf /workspace/lm-eval
              mkdir -p /workspace/lm-eval
              cp -a /app/. /workspace/lm-eval/
              cd /workspace/lm-eval
              python -m lm_eval_webui \
                --host 0.0.0.0 \
                --port 8080 \
                --data-dir /data \
                --static-dir static \
                --openai-base-url "$OPENAI_BASE_URL" \
                --pi-bench-dir /workspace/lm-eval/third_party/pi-bench
          volumeMounts:
            - name: data
              mountPath: /data
            - name: workspace
              mountPath: /workspace
            - name: pi-auth
              mountPath: /secrets/pi-auth
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: docker
          image: docker:27-dind
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: docker-graph
              mountPath: /var/lib/docker
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lm-eval-data
        - name: workspace
          emptyDir: {}
        - name: docker-graph
          emptyDir: {}
        - name: pi-auth
          secret:
            secretName: pi-auth
            optional: true
